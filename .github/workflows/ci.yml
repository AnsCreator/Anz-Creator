name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Style Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install flake8 isort

      - name: Run flake8
        run: |
          flake8 . \
            --max-line-length=120 \
            --exclude=.git,__pycache__,build,dist,venv,.venv \
            --ignore=E501,W503,E402

      - name: Check import order
        run: isort --check-only --diff --profile black .

  validate:
    name: Validate Imports
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install PyQt6 qt-material PyYAML opencv-python-headless numpy Pillow requests

      - name: Validate Python syntax (all files)
        run: |
          python -m py_compile main.py
          python -m py_compile core/settings.py
          python -m py_compile core/task_queue.py
          python -m py_compile core/model_manager.py
          python -m py_compile core/downloader.py
          python -m py_compile core/video_io.py
          python -m py_compile utils/logger.py
          python -m py_compile utils/ffmpeg_wrapper.py
          python -m py_compile utils/scene_detector.py
          echo "All files compiled successfully."

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-glx libglib2.0-0

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install PyQt6 qt-material PyYAML opencv-python-headless numpy Pillow requests pytest

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
