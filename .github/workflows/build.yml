name: Build Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Auto-increment version and create tag
  version:
    name: Auto Version Tag
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get latest tag and bump
        id: tag
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          if [ -z "$LATEST" ]; then
            NEW_TAG="v1.0.0.1"
          else
            BASE=$(echo "$LATEST" | sed 's/\.[0-9]*$//')
            BUILD=$(echo "$LATEST" | grep -oE '[0-9]+$')
            NEXT=$((BUILD + 1))
            NEW_TAG="${BASE}.${NEXT}"
          fi

          echo "Latest: $LATEST -> New: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

          if [ -n "$LATEST" ]; then
            CHANGELOG=$(git log ${LATEST}..HEAD --pretty=format:"- %s" --no-merges | head -20)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges | head -20)
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "changelog<<$EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.tag.outputs.new_tag }}
          git push origin ${{ steps.tag.outputs.new_tag }}

  # Build Windows Installer
  build-installer:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: version
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Git
        run: choco install git -y --no-progress

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Clone and install SAM2
        run: |
          echo "Cloning SAM2 repository..."
          git clone --depth 1 https://github.com/facebookresearch/segment-anything-2.git
          cd segment-anything-2
          pip install -e .
          cd ..
          echo "SAM2 installation complete."

      - name: Install FFmpeg
        run: choco install ffmpeg -y --no-progress

      - name: Write version file
        run: |
          echo '${{ needs.version.outputs.new_tag }}' > version.txt

      - name: Check icon file
        run: |
          if (Test-Path "icon.ico") {
            Write-Host "icon.ico found"
          } else {
            Write-Host "No icon.ico found"
          }

      - name: Build with PyInstaller
        run: pyinstaller anz_creator.spec

      - name: Prepare dist folder
        run: |
          echo "Preparing distribution folder..."
          New-Item -ItemType Directory -Force -Path "installer_build"
          
          if (Test-Path "dist\Anz-Creator") {
            Copy-Item -Path "dist\Anz-Creator\*" -Destination "installer_build\" -Recurse -Force
          } else {
            Copy-Item -Path "dist\*.exe" -Destination "installer_build\" -Force
          }
          
          Copy-Item -Path "version.txt" -Destination "installer_build\" -Force
          Copy-Item -Path "config.yaml" -Destination "installer_build\" -Force
          
          if (Test-Path "icon.ico") {
            Copy-Item -Path "icon.ico" -Destination "installer_build\" -Force
          }

      - name: Create NSIS Script
        run: |
          $version = "${{ needs.version.outputs.new_tag }}".TrimStart('v')
          
          $script = @"
          ; Anz-Creator NSIS Installer Script
          
          ;--------------------------------
          ; Includes
          !include "MUI2.nsh"
          !include "FileFunc.nsh"
          
          ;--------------------------------
          ; General
          Name "Anz-Creator"
          OutFile "release\Anz-Creator-Setup-v$version.exe"
          Unicode True
          InstallDir "\$PROGRAMFILES64\Anz-Creator"
          InstallDirRegKey HKLM "Software\Anz-Creator" "Install_Dir"
          RequestExecutionLevel admin
          
          ;--------------------------------
          ; Interface Settings
          !define MUI_ABORTWARNING
          !define MUI_ICON "installer_build\icon.ico"
          !define MUI_UNICON "installer_build\icon.ico"
          
          ;--------------------------------
          ; Version Information
          VIProductVersion "$version.0"
          VIAddVersionKey "ProductName" "Anz-Creator"
          VIAddVersionKey "CompanyName" "AnzCreator"
          VIAddVersionKey "FileDescription" "AI-powered Video Processing Toolkit"
          VIAddVersionKey "FileVersion" "$version"
          VIAddVersionKey "LegalCopyright" "AnzCreator"
          
          ;--------------------------------
          ; Pages
          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_LICENSE "LICENSE"
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH
          
          !insertmacro MUI_UNPAGE_CONFIRM
          !insertmacro MUI_UNPAGE_INSTFILES
          
          ;--------------------------------
          ; Languages
          !insertmacro MUI_LANGUAGE "English"
          
          ;--------------------------------
          ; Installer Section
          Section "Install"
            SectionIn RO
            SetOutPath \$INSTDIR
            
            ; Write installation path
            WriteRegStr HKLM "Software\Anz-Creator" "Install_Dir" "\$INSTDIR"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Anz-Creator" "DisplayName" "Anz-Creator"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Anz-Creator" "UninstallString" '"\$INSTDIR\uninstall.exe"'
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Anz-Creator" "DisplayIcon" "\$INSTDIR\Anz-Creator.exe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Anz-Creator" "DisplayVersion" "$version"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Anz-Creator" "Publisher" "AnzCreator"
            WriteRegDWORD HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Anz-Creator" "NoModify" 1
            WriteRegDWORD HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Anz-Creator" "NoRepair" 1
            
            ; Copy all files
            File /r "installer_build\*.*"
            
            ; Create uninstaller
            WriteUninstaller "\$INSTDIR\uninstall.exe"
            
            ; Create shortcuts
            CreateDirectory "\$SMPROGRAMS\Anz-Creator"
            CreateShortcut "\$SMPROGRAMS\Anz-Creator\Anz-Creator.lnk" "\$INSTDIR\Anz-Creator.exe" "" "\$INSTDIR\Anz-Creator.exe" 0
            CreateShortcut "\$SMPROGRAMS\Anz-Creator\Uninstall.lnk" "\$INSTDIR\uninstall.exe" "" "\$INSTDIR\uninstall.exe" 0
            CreateShortcut "\$DESKTOP\Anz-Creator.lnk" "\$INSTDIR\Anz-Creator.exe" "" "\$INSTDIR\Anz-Creator.exe" 0
          SectionEnd
          
          ;--------------------------------
          ; Uninstaller Section
          Section "Uninstall"
            ; Remove shortcuts
            Delete "\$DESKTOP\Anz-Creator.lnk"
            Delete "\$SMPROGRAMS\Anz-Creator\*.lnk"
            RMDir "\$SMPROGRAMS\Anz-Creator"
            
            ; Remove files
            RMDir /r "\$INSTDIR"
            
            ; Remove registry keys
            DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Anz-Creator"
            DeleteRegKey HKLM "Software\Anz-Creator"
          SectionEnd
          "@
          
          $script | Out-File -FilePath "setup.nsi" -Encoding UTF8
          Write-Host "NSIS script created"

      - name: Build Installer with NSIS
        run: |
          New-Item -ItemType Directory -Force -Path release
          & "C:\Program Files (x86)\NSIS\makensis.exe" setup.nsi
          Write-Host "Installer built:"
          Get-ChildItem -Path release | Select-Object Name, @{Name="Size(MB)";Expression={[math]::Round($_.Length/1MB,2)}}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: Anz-Creator-Installer
          path: release/*.exe
          retention-days: 30

  # Create GitHub Release
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version, build-installer]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v6
        with:
          name: Anz-Creator-Installer
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_tag }}
          name: "Anz-Creator ${{ needs.version.outputs.new_tag }}"
          body: |
            ## 🚀 Anz-Creator ${{ needs.version.outputs.new_tag }}
            
            ### 📝 Changes
            ${{ needs.version.outputs.changelog }}
            
            ### ✨ Features
            - 🔴 **Watermark Removal** - Auto (YOLOv8) + Manual (SAM2)
            - 🎬 **ProPainter** - Temporal-consistent video inpainting
            - 📥 **yt-dlp** - Support 1000+ platforms
            - 🎨 **PyQt6 Dark UI** - Modern material design
            - ⚡ **SAM2 Pre-installed** - No manual setup!
            
            ### 💻 System Requirements
            - Windows 10/11 64-bit
            - 8GB RAM minimum
            - NVIDIA GPU 4-12GB VRAM (recommended)
            
            ### 📦 Installation
            1. Download `Anz-Creator-Setup-v*.exe`
            2. Run as Administrator
            3. Follow the setup wizard
            
            ### 🔧 Uninstall
            Use Windows "Add or Remove Programs" or run `uninstall.exe` in installation folder.
          files: ./release/*
          draft: false
          prerelease: false
