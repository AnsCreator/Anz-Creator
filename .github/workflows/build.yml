name: Build Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Auto-increment version and create tag
  version:
    name: Auto Version Tag
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get latest tag and bump
        id: tag
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          if [ -z "$LATEST" ]; then
            NEW_TAG="v1.0.0.1"
          else
            BASE=$(echo "$LATEST" | sed 's/\.[0-9]*$//')
            BUILD=$(echo "$LATEST" | grep -oE '[0-9]+$')
            NEXT=$((BUILD + 1))
            NEW_TAG="${BASE}.${NEXT}"
          fi

          echo "Latest: $LATEST -> New: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

          if [ -n "$LATEST" ]; then
            CHANGELOG=$(git log ${LATEST}..HEAD --pretty=format:"- %s" --no-merges | head -20)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges | head -20)
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "changelog<<$EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.tag.outputs.new_tag }}
          git push origin ${{ steps.tag.outputs.new_tag }}

  # Build Windows Installer
  build-installer:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: version
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Git
        run: choco install git -y --no-progress

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Clone and install SAM2
        run: |
          echo "Cloning SAM2 repository..."
          git clone --depth 1 https://github.com/facebookresearch/segment-anything-2.git
          cd segment-anything-2
          pip install -e .
          cd ..
          echo "SAM2 installation complete."

      - name: Verify SAM2 installation
        run: |
          python -c "import sam2; print('SAM2 imported successfully')"

      - name: Install FFmpeg
        run: choco install ffmpeg -y --no-progress

      - name: Write version file
        run: |
          echo '${{ needs.version.outputs.new_tag }}' > version.txt

      - name: Check icon file
        run: |
          if (Test-Path "icon.ico") {
            Write-Host "icon.ico found"
          } else {
            Write-Host "No icon.ico found, installer will use default"
          }

      - name: Build with PyInstaller
        run: pyinstaller anz_creator.spec

      - name: Prepare dist folder
        run: |
          echo "Preparing distribution folder..."
          New-Item -ItemType Directory -Force -Path "installer_build"
          
          if (Test-Path "dist\Anz-Creator") {
            Copy-Item -Path "dist\Anz-Creator\*" -Destination "installer_build\" -Recurse -Force
          } else {
            Copy-Item -Path "dist\*.exe" -Destination "installer_build\" -Force
          }
          
          Copy-Item -Path "version.txt" -Destination "installer_build\" -Force
          Copy-Item -Path "config.yaml" -Destination "installer_build\" -Force
          
          if (Test-Path "icon.ico") {
            Copy-Item -Path "icon.ico" -Destination "installer_build\" -Force
          }
          
          Write-Host "Dist folder prepared:"
          Get-ChildItem -Path "installer_build" | Select-Object Name

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Create Inno Setup Script
        run: |
          $version = "${{ needs.version.outputs.new_tag }}".TrimStart('v')
          $appName = "Anz-Creator"
          $publisher = "AnzCreator"
          $url = "https://github.com/AnsCreator/Anz-Creator"
          
          $iconLine = if (Test-Path "installer_build\icon.ico") {
            "SetupIconFile=installer_build\icon.ico"
          } else {
            ""
          }
          
          $script = @"
          #define AppName "$appName"
          #define AppVersion "$version"
          #define AppPublisher "$publisher"
          #define AppURL "$url"
          #define AppExeName "Anz-Creator.exe"
          
          [Setup]
          AppId={{A1B2C3D4-E5F6-7890-ABCD-EF1234567890}
          AppName={#AppName}
          AppVersion={#AppVersion}
          AppPublisher={#AppPublisher}
          AppPublisherURL={#AppURL}
          AppSupportURL={#AppURL}
          AppUpdatesURL={#AppURL}
          DefaultDirName={autopf}\{#AppName}
          DefaultGroupName={#AppName}
          AllowNoIcons=yes
          LicenseFile=LICENSE
          OutputDir=release
          OutputBaseFilename=Anz-Creator-Setup-v{#AppVersion}
          $iconLine
          Compression=lzma2/max
          SolidCompression=yes
          WizardStyle=modern
          PrivilegesRequired=lowest
          PrivilegesRequiredOverridesAllowed=dialog
          ArchitecturesAllowed=x64
          ArchitecturesInstallIn64BitMode=x64
          MinVersion=10.0
          
          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"
          
          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked
          
          [Files]
          Source: "installer_build\{#AppExeName}"; DestDir: "{app}"; Flags: ignoreversion
          Source: "installer_build\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
          
          [Icons]
          Name: "{group}\{#AppName}"; Filename: "{app}\{#AppExeName}"
          Name: "{group}\{cm:UninstallProgram,{#AppName}}"; Filename: "{uninstallexe}"
          Name: "{autodesktop}\{#AppName}"; Filename: "{app}\{#AppExeName}"; Tasks: desktopicon
          
          [Run]
          Filename: "{app}\{#AppExeName}"; Description: "{cm:LaunchProgram,{#StringChange(AppName, '&', '&&')}}"; Flags: nowait postinstall skipifsilent
          "@
          
          $script | Out-File -FilePath "setup.iss" -Encoding UTF8
          Write-Host "Inno Setup script created:"
          Get-Content "setup.iss"

      - name: Build Installer with Inno Setup
        run: |
          New-Item -ItemType Directory -Force -Path release
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss
          Write-Host "Installer built:"
          Get-ChildItem -Path release | Select-Object Name, @{Name="Size(MB)";Expression={[math]::Round($_.Length/1MB,2)}}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: Anz-Creator-Installer
          path: release/*.exe
          retention-days: 30

  # Create GitHub Release
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version, build-installer]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v6
        with:
          name: Anz-Creator-Installer
          path: ./release

      - name: List files
        run: ls -la ./release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_tag }}
          name: "Anz-Creator ${{ needs.version.outputs.new_tag }}"
          body: |
            ## 🚀 Anz-Creator ${{ needs.version.outputs.new_tag }}
            
            ### 📝 Changes
            ${{ needs.version.outputs.changelog }}
            
            ### ✨ Features
            - 🔴 **Watermark Removal** - Auto (YOLOv8) + Manual (SAM2)
            - 🎬 **ProPainter** - Temporal-consistent video inpainting
            - 📥 **yt-dlp** - Support 1000+ platforms (YouTube, TikTok, etc.)
            - 🎨 **PyQt6 Dark UI** - Modern material design
            - ⚡ **SAM2 Pre-installed** - No manual setup!
            
            ### 💻 System Requirements
            - Windows 10/11 64-bit
            - 8GB RAM minimum (16GB recommended)
            - NVIDIA GPU 4-12GB VRAM (for best performance)
            - 5GB free disk space
            
            ### 📦 Installation
            1. Download `Anz-Creator-Setup-v*.exe`
            2. Run the installer
            3. Follow the setup wizard
            4. Launch from desktop shortcut or Start Menu
            
            ### 🎯 First Run
            - yt-dlp, FFmpeg, and AI models auto-download on first use
            - Models stored in `%APPDATA%\Anz-Creator\models\`
            - Settings saved in `%APPDATA%\Anz-Creator\settings.yaml`
            
            ### 🔧 Uninstall
            Use Windows "Add or Remove Programs" or run `Uninstall Anz-Creator` from Start Menu.
          files: ./release/*
          draft: false
          prerelease: false
