name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

jobs:
  build-windows:
    name: Build .exe (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install FFmpeg
        run: choco install ffmpeg -y

      - name: Build with PyInstaller
        run: pyinstaller anz_creator.spec

      - name: Zip output
        run: Compress-Archive -Path dist/Anz-Creator/* -DestinationPath dist/Anz-Creator-Windows.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: Anz-Creator-Windows
          path: dist/Anz-Creator-Windows.zip
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          name: Anz-Creator-Windows
          path: ./release

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "Anz-Creator ${{ steps.version.outputs.VERSION }}"
          body: |
            ## Anz-Creator ${{ steps.version.outputs.VERSION }}

            ### What's included
            - Watermark Removal (Auto YOLOv8 + Manual SAM2)
            - ProPainter video inpainting
            - yt-dlp support for 1000+ platforms
            - PyQt6 dark material UI

            ### Requirements
            - Windows 10/11 64-bit
            - NVIDIA GPU with 4-12GB VRAM (recommended)
            - FFmpeg installed and in PATH

            ### First run
            AI models will auto-download on first use (~150MB default).
          files: ./release/Anz-Creator-Windows.zip
          draft: false
          prerelease: false
