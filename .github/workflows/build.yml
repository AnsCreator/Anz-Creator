name: Build Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  version:
    name: Auto Version Tag
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get latest tag and bump
        id: tag
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            NEW_TAG="v1.0.0.1"
          else
            BASE=$(echo "$LATEST" | sed 's/\.[0-9]*$//')
            BUILD=$(echo "$LATEST" | grep -oE '[0-9]+$')
            NEXT=$((BUILD + 1))
            NEW_TAG="${BASE}.${NEXT}"
          fi
          echo "Latest: $LATEST -> New: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          if [ -n "$LATEST" ]; then
            CHANGELOG=$(git log ${LATEST}..HEAD --pretty=format:"- %s" --no-merges | head -20)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges | head -20)
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "changelog<<$EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.tag.outputs.new_tag }}
          git push origin ${{ steps.tag.outputs.new_tag }}

  build-installer:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: version
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Git
        run: choco install git -y --no-progress

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 qt-material
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install PyYAML yt-dlp opencv-python ultralytics numpy Pillow scenedetect requests
          pip install hydra-core omegaconf iopath fvcore yacs tqdm
          pip install pyinstaller

      - name: Clone SAM2
        run: |
          git clone --depth 1 https://github.com/facebookresearch/segment-anything-2.git
          echo "SAM2 cloned (latest main)"

      - name: Fix SAM2 symbolic links
        run: |
          Get-ChildItem -Path "segment-anything-2" -Recurse -File | ForEach-Object {
            if ($_.LinkType -eq "SymbolicLink") {
              Remove-Item $_.FullName -Force
              "model:`n  name: sam2_hiera`n  encoder:`n    embed_dim: 112`n    num_heads: 2`n  decoder:`n    num_mask_tokens: 4" | Out-File -FilePath $_.FullName -Encoding UTF8
            }
          }

      - name: Write version file
        run: echo '${{ needs.version.outputs.new_tag }}' > version.txt

      - name: Build with PyInstaller
        run: |
          $env:PYTHONPATH = "$pwd\segment-anything-2;$env:PYTHONPATH"
          pyinstaller `
            --name "Anz-Creator" `
            --windowed `
            --onefile `
            --add-data "config.yaml;." `
            --add-data "version.txt;." `
            --add-data "segment-anything-2\sam2;sam2" `
            --hidden-import PyQt6 `
            --hidden-import PyQt6.QtCore `
            --hidden-import PyQt6.QtGui `
            --hidden-import PyQt6.QtWidgets `
            --hidden-import qt_material `
            --hidden-import sam2 `
            --hidden-import sam2.build_sam `
            --hidden-import sam2.sam2_image_predictor `
            --hidden-import sam2.sam2_video_predictor `
            --hidden-import sam2.modeling `
            --hidden-import sam2.modeling.sam2_base `
            --hidden-import sam2.modeling.transformer `
            --hidden-import sam2.modeling.backbones `
            --hidden-import sam2.utils `
            --hidden-import hydra `
            --hidden-import hydra._internal `
            --hidden-import omegaconf `
            --hidden-import iopath `
            --hidden-import fvcore `
            --hidden-import yacs `
            --hidden-import tqdm `
            --hidden-import ultralytics `
            --hidden-import torch `
            --hidden-import cv2 `
            --collect-all sam2 `
            --collect-all hydra `
            --collect-all omegaconf `
            --icon icon.ico `
            main.py

      - name: Prepare dist folder
        run: |
          New-Item -ItemType Directory -Force -Path "installer_build"
          Copy-Item -Path "dist\Anz-Creator.exe" -Destination "installer_build\" -Force
          Copy-Item -Path "version.txt" -Destination "installer_build\" -Force
          Copy-Item -Path "config.yaml" -Destination "installer_build\" -Force

      - name: Create NSIS Script
        run: |
          $version = "${{ needs.version.outputs.new_tag }}".TrimStart('v')
          @"
          !include "MUI2.nsh"
          Name "Anz-Creator"
          OutFile "release\Anz-Creator-Setup.exe"
          Unicode True
          InstallDir `$PROGRAMFILES64\Anz-Creator`
          RequestExecutionLevel admin
          VIProductVersion "$version.0"
          VIAddVersionKey "ProductName" "Anz-Creator"
          VIAddVersionKey "FileVersion" "$version"
          VIAddVersionKey "CompanyName" "AnzCreator"
          VIAddVersionKey "FileDescription" "AI-powered Video Processing Toolkit"
          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH
          !insertmacro MUI_LANGUAGE "English"
          Section "Install"
            SetOutPath `$INSTDIR`
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Anz-Creator" "DisplayName" "Anz-Creator"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Anz-Creator" "UninstallString" '"`$INSTDIR\uninstall.exe"'
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Anz-Creator" "DisplayIcon" "`$INSTDIR\Anz-Creator.exe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Anz-Creator" "DisplayVersion" "$version"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Anz-Creator" "Publisher" "AnzCreator"
            WriteRegDWORD HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Anz-Creator" "NoModify" 1
            WriteRegDWORD HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Anz-Creator" "NoRepair" 1
            File /r "installer_build\*"
            WriteUninstaller "`$INSTDIR\uninstall.exe"
            CreateDirectory "`$SMPROGRAMS\Anz-Creator"
            CreateShortcut "`$SMPROGRAMS\Anz-Creator\Anz-Creator.lnk" "`$INSTDIR\Anz-Creator.exe"
            CreateShortcut "`$DESKTOP\Anz-Creator.lnk" "`$INSTDIR\Anz-Creator.exe"
          SectionEnd
          Section "Uninstall"
            Delete "`$DESKTOP\Anz-Creator.lnk"
            RMDir /r "`$SMPROGRAMS\Anz-Creator"
            RMDir /r "`$INSTDIR"
            DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\Anz-Creator"
          SectionEnd
          "@ | Out-File -FilePath "setup.nsi" -Encoding ASCII

      - name: Build Installer
        run: |
          New-Item -ItemType Directory -Force -Path release
          & "C:\Program Files (x86)\NSIS\makensis.exe" setup.nsi
          Get-ChildItem -Path release

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: Anz-Creator-Installer
          path: release/*.exe
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version, build-installer]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v6
        with:
          name: Anz-Creator-Installer
          path: ./release
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_tag }}
          name: "Anz-Creator ${{ needs.version.outputs.new_tag }}"
          body: |
            ## 🚀 Anz-Creator ${{ needs.version.outputs.new_tag }}
            
            ### Changes
            ${{ needs.version.outputs.changelog }}
            
            ### Features
            - Watermark Removal (Auto YOLOv8 + Manual SAM2)
            - ProPainter video inpainting
            - yt-dlp support 1000+ platforms
            - PyQt6 Dark UI
            
            *(Note: System Dependencies like FFmpeg and AI Models like SAM2/YOLOv8 are no longer pre-bundled to keep the installer lightweight. You can download them directly inside the app via the Settings menu).*
            
            ### Requirements
            - Windows 10/11 64-bit
            - 8GB RAM minimum
            - NVIDIA GPU 4-12GB VRAM (recommended)
            
            ### Installation
            1. Download Anz-Creator-Setup.exe
            2. Run as Administrator
            3. Follow setup wizard
          files: ./release/*
