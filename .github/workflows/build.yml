name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Auto-increment version and create tag
  version:
    name: Auto Version Tag
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get latest tag and bump
        id: tag
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          if [ -z "$LATEST" ]; then
            NEW_TAG="v1.0.0.1"
          else
            BASE=$(echo "$LATEST" | sed 's/\.[0-9]*$//')
            BUILD=$(echo "$LATEST" | grep -oE '[0-9]+$')
            NEXT=$((BUILD + 1))
            NEW_TAG="${BASE}.${NEXT}"
          fi

          echo "Latest: $LATEST -> New: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

          if [ -n "$LATEST" ]; then
            CHANGELOG=$(git log ${LATEST}..HEAD --pretty=format:"- %s" --no-merges | head -20)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges | head -20)
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "changelog<<$EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.tag.outputs.new_tag }}
          git push origin ${{ steps.tag.outputs.new_tag }}

  # Build Windows .exe
  build-windows:
    name: Build .exe (Windows)
    runs-on: windows-latest
    needs: version
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Git
        run: choco install git -y --no-progress

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cu118
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Clone and install SAM2
        run: |
          echo "Cloning SAM2 repository..."
          git clone --depth 1 https://github.com/facebookresearch/segment-anything-2.git
          cd segment-anything-2
          echo "Installing SAM2..."
          pip install -e .
          cd ..
          echo "SAM2 installation complete."

      - name: Verify SAM2 installation
        run: |
          python -c "import sam2; print('SAM2 imported successfully')"

      - name: Install FFmpeg
        run: choco install ffmpeg -y --no-progress

      - name: Check icon file
        run: |
          if (Test-Path "icon.ico") {
            Write-Host "icon.ico found, will use for executable"
          } elseif (Test-Path "icon.icns") {
            Write-Host "icon.icns found (macOS format), will generate icon.ico"
            python -c "
            from PIL import Image
            img = Image.open('icon.icns')
            # Convert ICNS to ICO
            sizes = [(16,16), (32,32), (48,48), (64,64), (128,128), (256,256)]
            # Take largest available size
            img.save('icon.ico', format='ICO', sizes=sizes)
            print('Generated icon.ico from icon.icns')
            "
          } else {
            Write-Host "No icon file found, using default"
          }

      - name: Write version file
        run: |
          echo '${{ needs.version.outputs.new_tag }}' > version.txt

      - name: Build with PyInstaller
        run: pyinstaller anz_creator.spec

      - name: Verify build output
        run: |
          echo "Checking dist folder structure:"
          Get-ChildItem -Path dist -Recurse | Select-Object FullName

      - name: Copy version file to dist
        run: |
          if (Test-Path "dist\Anz-Creator") {
            Copy-Item version.txt "dist\Anz-Creator\"
            Write-Host "Copied version.txt to dist\Anz-Creator\"
          } elseif (Test-Path "dist") {
            Copy-Item version.txt "dist\"
            Write-Host "Copied version.txt to dist\"
          } else {
            Write-Error "dist folder not found!"
            exit 1
          }

      - name: Create output directory for zip
        run: |
          New-Item -ItemType Directory -Force -Path release

      - name: Zip output
        run: |
          if (Test-Path "dist\Anz-Creator") {
            Compress-Archive -Path "dist\Anz-Creator\*" -DestinationPath "release\Anz-Creator-Windows.zip"
          } else {
            Compress-Archive -Path "dist\*.exe", "dist\version.txt" -DestinationPath "release\Anz-Creator-Windows.zip"
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: Anz-Creator-Windows
          path: release/Anz-Creator-Windows.zip
          retention-days: 30

  # Create GitHub Release
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version, build-windows]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v6
        with:
          name: Anz-Creator-Windows
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_tag }}
          name: "Anz-Creator ${{ needs.version.outputs.new_tag }}"
          body: |
            ## Anz-Creator ${{ needs.version.outputs.new_tag }}

            ### Changes
            ${{ needs.version.outputs.changelog }}

            ### Features
            - Watermark Removal (Auto YOLOv8 + Manual SAM2)
            - ProPainter video inpainting
            - yt-dlp + FFmpeg auto-download on first run
            - PyQt6 dark material UI
            - **SAM2 pre-installed** - No manual setup required!

            ### Requirements
            - Windows 10/11 64-bit
            - NVIDIA GPU with 4-12GB VRAM (recommended)

            ### First run
            yt-dlp, FFmpeg, and AI models auto-download on first use.
            SAM2 is already included in the executable.
          files: ./release/Anz-Creator-Windows.zip
          draft: false
          prerelease: false
